<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro Moderno | UX Experience</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <main class="container">
      <form id="registrationForm" class="glass-form">
        <h2>Criar Conta</h2>
        <p>Junte-se a nós e comece sua jornada.</p>

        <div class="input-group">
          <label for="name">Nome Completo</label>
          <input type="text" id="name" placeholder="Ex: João Silva" required />
          <span class="error-msg">Por favor, insira seu nome.</span>
        </div>

        <div class="input-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required />
          <span class="error-msg">Insira um e-mail válido.</span>
        </div>

        <div class="input-group">
          <label for="phone">Telefone</label>
          <input
            type="text"
            id="phone"
            placeholder="(00) 00000-0000"
            maxlength="15"
          />
        </div>

        <div class="input-group">
          <label for="password">Senha</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              placeholder="Mínimo 8 caracteres"
              required
            />
            <i class="fa-regular fa-eye" id="togglePassword"></i>
          </div>
          <span class="error-msg"
            >A senha deve ter pelo menos 8 caracteres.</span
          >
        </div>

        <button type="submit" id="submitBtn">Finalizar Cadastro</button>

        <div id="successMessage" class="hidden">
          <i class="fa-solid fa-circle-check"></i>
          Cadastro realizado com sucesso!
        </div>
      </form>
    </main>

    <script src="script.js"></script>
  </body>
</html>
